{{- if .Values.autoscaling.enabled }}
{{- if .Values.controller.enabled }}
apiVersion: temporal.io/v1alpha1
kind: WorkerResourceTemplate
metadata:
  name: {{ include "zigflow.fullname" . }}
  labels:
    {{- include "zigflow.labels" . | nindent 4 }}
spec:
  temporalWorkerDeploymentRef:
    name: {{ include "zigflow.fullname" . }}
  template:
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    spec:
      # Do not set this to a real value — the webhook will reject it.
      scaleTargetRef: {}
      minReplicas: {{ .Values.autoscaling.minReplicas }}
      maxReplicas: {{ .Values.autoscaling.maxReplicas }}
      metrics:
        {{- include "zigflow.autoscalingMetrics" . | nindent 8 }}
{{- else }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "zigflow.fullname" . }}
  labels:
    {{- include "zigflow.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "zigflow.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- include "zigflow.autoscalingMetrics" . | nindent 8 }}
{{- end }}
{{- end }}
