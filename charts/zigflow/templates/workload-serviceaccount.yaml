{{- if .Values.workloadServiceAccount.create }}
# Identity used by Kubernetes Jobs created from run.container tasks. It is
# intentionally NOT bound to the worker's Role: workload pods should not be
# able to create/delete Jobs or read pod logs. If a specific workload
# requires extra permissions, bind a dedicated Role to this account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zigflow.workloadServiceAccountName" . }}
  labels:
    {{- include "zigflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: workload
  {{- with .Values.workloadServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.workloadServiceAccount.automount }}
{{- end }}
