suite: workflow Secret rendering

tests:
  - it: does not render a Secret in external-secret mode (regression test)
    set:
      workflow.enabled: true
      workflow.useInline: false
      workflow.rawFile: ""
      workflow.secret: workflow
    asserts:
      - hasDocuments:
          count: 0
    template: templates/workflow.yaml

  - it: renders a Secret in inline mode
    set:
      workflow.enabled: true
      workflow.useInline: true
      workflow.rawFile: ""
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: workflow
    template: templates/workflow.yaml

  - it: renders a Secret in rawFile mode
    set:
      workflow.enabled: true
      workflow.useInline: false
      workflow.rawFile: "document:\n  name: test\n"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - isNotEmpty:
          path: data["workflow.yaml"]
    template: templates/workflow.yaml

  - it: does not render a Secret when workflow is disabled
    set:
      workflow.enabled: false
      workflow.useInline: true
    asserts:
      - hasDocuments:
          count: 0
    template: templates/workflow.yaml
