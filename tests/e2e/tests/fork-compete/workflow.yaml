document:
  dsl: 1.0.0
  taskQueue: fork-competing
  workflowType: workflow
  version: 0.0.1
do:
  - fork-compete:
      output:
        as:
          fork: ${ . }
      fork:
        compete: true
        branches:
          - callHTTP:
              call: http
              with:
                method: get
                endpoint: ${ "http://" + $env.HTTP_MOCK + "/posts/1" }
          # Use a wait task to guarantee which one wins
          - wait:
              wait:
                seconds: 5
