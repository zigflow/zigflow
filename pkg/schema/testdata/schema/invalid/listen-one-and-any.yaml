# listen.to must contain exactly one of: one, any, all
# Specifying both one and any satisfies two oneOf branches, failing the constraint
document:
  dsl: 1.0.0
  namespace: zigflow
  name: listen-one-and-any
  version: 0.0.1
do:
  - waitForEvent:
      listen:
        to:
          one:
            with:
              id: my-signal
              type: signal
          any:
            - with:
                id: my-update
                type: update
