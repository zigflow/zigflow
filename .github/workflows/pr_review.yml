name: PR Review
on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex_review:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.head.repo.full_name == github.repository ||
      (github.event.action == 'labeled' && github.event.label.name == 'ai-review')
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Fetch base branch and PR head
        run: |
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this pull request as a code reviewer.

            Only report actionable issues introduced by the changes in this PR.
            Do not comment on pre-existing issues, unrelated code, or general
            improvements unless they are directly caused by this PR.

            The goal of this review is to determine if the PR is ready to ship.
            Focus on issues that would block a "ship it" decision.

            Prioritise:
            - correctness regressions
            - security issues introduced by the change
            - missing or inadequate tests for changed behaviour
            - maintainability problems that would make future changes harder or riskier

            For each issue:
            - clearly state severity (high, medium, low)
            - explain why it matters
            - suggest a concrete fix where possible

            Avoid nitpicks and stylistic suggestions unless they meaningfully
            impact maintainability or correctness.

            If there are no blocking or significant issues, explicitly say:
            "No blocking issues. Ship it."

            Be concise and specific.
          sandbox: workspace-write
          safety-strategy: drop-sudo

  post_review_comment:
    runs-on: ubuntu-latest
    needs: codex_review
    if: needs.codex_review.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post review comment to PR
        uses: actions/github-script@v8
        env:
          CODEX_REVIEW: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- codex-pr-review -->';
            const body = `${marker}
            ## Codex PR Review

            ${process.env.CODEX_REVIEW}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
