name: Update Dependencies

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Update Pre-Commit dependencies
        run: |
          pip install pre-commit
          pre-commit autoupdate

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Update Go dependencies
        run: |
          go get -u ./...
          go mod tidy
          go generate ./...

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            docs/package-lock.json
            scripts/package-lock.json
            examples/**/package-lock.json

      - name: Discover Node packages
        run: |
          find docs scripts examples \
            -name package.json \
            -not -path "*/node_modules/*" \
            -exec dirname {} \; \
            | sort > /tmp/node-packages.txt

          echo "Discovered Node packages:"
          cat /tmp/node-packages.txt

      - name: Update Node dependencies
        run: |
          while IFS= read -r dir; do
            echo "Updating npm dependencies in $dir"
            npm --prefix "$dir" install
            npm --prefix "$dir" update
          done < /tmp/node-packages.txt

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body: |
            Automated dependency refresh.

            - Pre-commit dependencies updated via `pre-commit autoupdate`
            - Go dependencies updated via `go get -u ./...` and `go mod tidy`
            - Docs npm dependencies updated via `npm update` in `docs`
            - Examples npm dependencies updated via `npm update` in `examples`
            - Scripts npm dependencies updated via `npm update` in `scripts`
          branch: chore/update-deps
          delete-branch: true
          labels: dependencies
          signoff: true
          token: ${{ secrets.MONTHLY_UPDATE_TOKEN }}
