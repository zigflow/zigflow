version: '3'

vars:
  EXAMPLES: ./examples
  E2E_COMPOSE: ./tests/e2e/compose.yaml
  TMP_IMG: ttl.sh/zigflow
  TMP_IMG_TAG: 24h

tasks:
  changelog:
    desc: Generate the changelog
    cmds:
      - ./scripts/bin/cli.mjs generate-changelog CHANGELOG.md

  commitlint:
    desc: Run commitlint
    cmds:
      - npx commitlint --version
      - npm i -g @commitlint/config-conventional
      - npx commitlint --to HEAD

  cruft-update:
    desc: Check/update cruft template
    cmds:
      - |
        if [ ! -f .cruft.json ]; then
          echo "Cruft not configured"
        else
          cruft check || cruft update --skip-apply-ask --refresh-private-variables
        fi

  e2e:
    cmds:
      - go clean -testcache
      - task: e2e:central
      - task: e2e:examples

  # Central e2e suite: shared dependencies managed by Docker Compose.
  e2e:central:
    internal: true
    cmds:
      - defer: docker compose -f {{.E2E_COMPOSE}} down
      - docker compose -f {{.E2E_COMPOSE}} up -d --wait
      - |
        export TEMPORAL_ADDRESS=$(docker compose -f {{.E2E_COMPOSE}} port temporal 7233)
        export ZIGGY_HTTP_MOCK=$(docker compose -f {{.E2E_COMPOSE}} port http_mock 8888)

        echo "Temporal address: $TEMPORAL_ADDRESS"
        echo "HTTP mock address: $ZIGGY_HTTP_MOCK"

        go test -v -tags=e2e ./tests/e2e/...

  # Example-local e2e tests: each example owns its dependencies through
  # Testcontainers, so any examples/<name>/e2e_test.go is picked up automatically
  # with no central registration.
  #
  # The Zigflow worker binary is built once and shared with every example test
  # via ZIGFLOW_E2E_BINARY, avoiding a per-test "go run" compile.
  #
  # Each example test starts its own Temporal container, so package parallelism
  # is capped via "go test -p" to bound concurrent containers and keep the suite
  # stable as more examples are added. The cap defaults to 4 and is overridable
  # with E2E_PARALLEL, for example "task e2e E2E_PARALLEL=2" on a constrained
  # machine or a higher value in CI with more resources.
  e2e:examples:
    internal: true
    deps:
      - generate-grpc
    vars:
      E2E_BINARY: '{{.ROOT_DIR}}/tmp/zigflow-e2e'
      E2E_PARALLEL: '{{.E2E_PARALLEL | default 4}}'
    cmds:
      - mkdir -p {{.ROOT_DIR}}/tmp
      - go build -o {{.E2E_BINARY}} .
      - ZIGFLOW_E2E_BINARY={{.E2E_BINARY}} go test -p {{.E2E_PARALLEL}} -v -tags=e2e ./examples/...

  generate-grpc:
    desc: Regenerate gRPC examples
    cmds:
      - |
        for dir in ./examples/external-calls/grpc/*; do
          rm -rf "${dir}/v1"
          buf generate --template "${dir}/proto/buf.gen.yaml" "${dir}/proto" --output "${dir}/.."
        done

  helm-img:
    desc: Build and push temporary Helm image
    cmds:
      - docker build -t {{.TMP_IMG}}:{{.TMP_IMG_TAG}} .
      - docker push {{.TMP_IMG}}:{{.TMP_IMG_TAG}}

  helm:
    desc: Deploy Helm chart locally
    cmds:
      - touch values.example.yaml
      - |
        helm upgrade \
          --cleanup-on-fail \
          --create-namespace \
          --install \
          --namespace zigflow \
          --reset-values \
          --rollback-on-failure \
          --set image.pullPolicy=Always \
          --set image.repository={{.TMP_IMG}} \
          --set image.tag={{.TMP_IMG_TAG}} \
          --values ./values.example.yaml \
          --wait \
          zigflow ./charts/zigflow

  install-deps:
    desc: Install npm deps for all frontend packages
    cmds:
      - |
        for dir in ./*/package.json; do
          cd "$(dirname "$dir")"
          echo "Installing $PWD"
          npm ci
          cd - > /dev/null
        done

  mcp:
    desc: Inspect the MCP server for development
    vars:
      ADDRESS: '{{.ADDRESS | default "http://localhost:8080"}}'
      TRANSPORT: '{{.TRANSPORT | default "stdio"}}'
    cmds:
      - |
        set -e

        case "{{.TRANSPORT}}" in
          stdio)
            npm_config_yes=true HOST=0.0.0.0 npx @modelcontextprotocol/inspector go run . mcp
            ;;

          http)
            echo "Make sure you run \"go run . mcp --transport http\" in another tab"
            npm_config_yes=true HOST=0.0.0.0 npx @modelcontextprotocol/inspector {{.ADDRESS}}
            ;;

          *)
            echo "Invalid TRANSPORT: {{.TRANSPORT}}"
            echo "Use: task mcp TRANSPORT=stdio|http"
            exit 1
            ;;
        esac

  minikube:
    desc: Start minikube and apply dev manifests
    cmds:
      - |
        minikube profile list | grep minikube | grep OK || minikube start
      - kubectl apply -f ./dev/k8s/
      # Install Temporal Worker Controller - https://github.com/temporalio/temporal-worker-controller
      - helm upgrade
          --cleanup-on-fail
          --create-namespace
          --install
          --namespace cert-manager
          --rollback-on-failure
          --set crds.enabled=true
          --version ^v1.20.0
          --wait
          cert-manager oci://quay.io/jetstack/charts/cert-manager
      - helm upgrade
          --cleanup-on-fail
          --create-namespace
          --install
          --namespace zigflow
          --rollback-on-failure
          --version ^0.26.0
          --wait
          temporal-worker-controller-crds oci://docker.io/temporalio/temporal-worker-controller-crds
      - helm upgrade
          --cleanup-on-fail
          --create-namespace
          --install
          --namespace zigflow
          --rollback-on-failure
          --set replicas=1
          --version ^0.26.0
          --wait
          temporal-worker-controller oci://docker.io/temporalio/temporal-worker-controller

  scan:
    desc: Scan for vulnerabilities
    cmds:
      - trivy config --severity HIGH,CRITICAL --format table --exit-code 1 charts/zigflow
      - trivy image --severity HIGH,CRITICAL --format table --exit-code 1 --pkg-types os,library --ignore-unfixed ghcr.io/zigflow/zigflow

  start:
    desc: Run example by name (NAME required)
    requires:
      vars: [NAME]
    cmds:
      - go run {{.EXAMPLES}}/{{.NAME}}

  worker:
    desc: Run worker for example (NAME required)
    requires:
      vars: [NAME]
    cmds:
      - go run . run -f {{.EXAMPLES}}/{{.NAME}}/workflow.yaml
