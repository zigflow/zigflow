version: 2
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    id: zigflow
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -w -s -X {{ .Env.GIT_REPO }}/cmd.Version={{ .Version }} -X {{ .Env.GIT_REPO }}/cmd.GitCommit={{ .FullCommit }}
archives:
  - formats:
      - binary
    # this name template makes the OS and Arch compatible with the results of uname.
    id: binaries
    ids:
      - zigflow
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
homebrew_casks:
  - name: zigflow
    ids:
      - binaries
    repository:
      owner: zigflow
      name: homebrew-tap
    directory: Casks
    homepage: https://zigflow.dev
    description: Define durable workflows in YAML, powered by Temporal
    license: Apache-2.0
    binaries:
      - zigflow
    hooks:
      post:
        install: |
          if OS.mac?
            binary_name = if Hardware::CPU.intel?
              "zigflow_darwin_x86_64"
            else
              "zigflow_darwin_arm64"
            end

            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/#{binary_name}"]
          end
    caveats: |
      Installs the latest stable Zigflow release.

      For a specific version, use GitHub Releases or Docker.
    commit_author:
      name: zigflow-bot
      email: bot@zigflow.dev
    commit_msg_template: Brew cask update for {{ .ProjectName }} version {{ .Tag }}
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
release:
  prerelease: auto
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
# modelines, feel free to remove those if you don't want/use them:
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
