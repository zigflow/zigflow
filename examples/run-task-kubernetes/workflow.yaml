document:
  dsl: 1.0.0
  taskQueue: zigflow
  workflowType: run-container-task-kubernetes
  version: 0.0.1
  title: Run Container Task Kubernetes
  summary: Run container tasks in a Kubernetes environment
  metadata:
    display: false
    tags:
      - run
      - container
      - kubernetes
    activityOptions:
      startToCloseTimeout:
        minutes: 1
do:
# This is the same workflow as examples/run-task/workflow.yaml but with a
# different workflowType and only the container task, to demonstrate running
# container tasks in Kubernetes. There are no script files examples, as need to
# be baked into the container image or mounted via a volume in a real Kubernetes
# environment.
  - container:
      export:
        as: '${ $context + { container: . } }'
      run:
        container:
          image: alpine
          pullPolicy: ifNotPresent
          arguments:
            - env
          environment:
            hello: world
            envvar: ${ $env.EXAMPLE_ENVVAR }
  - nodejs:
      export:
        as: '${ $context + { nodejs: . } }'
      run:
        script:
          language: js
          code: |
            const http = require('http');

            console.log(`${process.argv[2]} from ${process.env.NAME}`);

            console.log(http.STATUS_CODES);
          arguments:
            - Hello
          environment:
            NAME: js
  - python:
      export:
        as: '${ $context + { python: . } }'
      run:
        script:
          language: python
          code: |
            import os
            import sys

            def main():
                arg = sys.argv[1] if len(sys.argv) > 1 else ""

                name = os.getenv("NAME", "")

                print(f"{arg} from {name}")

            if __name__ == "__main__":
                main()
          arguments:
            - Hello
          environment:
            NAME: python
  - shell:
      output:
        as: '${ $context + { shell: . } }'
      run:
        shell:
          command: ls
          arguments:
            - -la
