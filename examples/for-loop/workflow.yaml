document:
  dsl: 1.0.0
  taskQueue: zigflow
  workflowType: for-loop
  version: 0.0.1
  title: For
  summary: How to use the for loop task
  metadata:
    tags:
      - for-loop
input:
  schema:
    format: json
    document:
      type: object
      required:
        - map
        - data
      properties:
        map:
          type: object
          required:
            - key1
            - key2
            - key3
          properties:
            key1:
              type: string
            key2:
              type: number
            key3:
              type: boolean
        data:
          type: array
          items:
            type: object
            required:
              - userId
            properties:
              userId:
                type: number
do:
  # Iterate over the map object
  - forTaskMap:
      export:
        as: '${ $context + { forTaskMap: . } }'
      for:
        in: ${ $input.map }
      do:
        - setData:
            export:
              as: ${ . }
            set:
              key: "${ \"hello: \" + $data.index }"
              value: ${ $data.item }
        - wait:
            output:
              as: ${ $context }
            wait:
              seconds: 2
  # Iterate over the data array
  - forTaskArray:
      export:
        as: '${ $context + { forTaskArray: . } }'
      for:
        each: item
        in: ${ $input.data }
        at: index
      # while: ${ $data.item.userId != 4 } # If this returns false, it will cut the iteration
      do:
        # Each iteration will run these tasks in order
        - setData:
            export:
              as: ${ . }
            set:
              userId: ${ $data.item.userId } # Get the userId for this iteration
              id: ${ $data.index } # Get the key
              processed: true
        - wait:
            output:
              as: ${ $context }
            wait:
              seconds: 1
  - forTaskNumber:
      export:
        as: '${ $context + { forTaskNumber: . } }'
      for:
        in: ${ 5 }
      do:
        - setData:
            export:
              as: ${ . }
            set:
              number: ${ $data.item }
        - wait:
            output:
              as: ${ $context }
            wait:
              seconds: 1
  - forTaskStateCarryOver:
      output:
        as: '${ $context + { forTaskStateCarryOver: . } }'
      for:
        in: ${ 5 }
      while: '${ ($output.pageNumber // 0) < 4 }'
      do:
        - incrementPage:
            output:
              as: '${ { pageNumber: ($context.pageNumber + 1), iteration: $data.index } }'
            export:
              as: '${ $context + { pageNumber: ($context.pageNumber + 1) } }'
            set:
              previousPageNumber: ${ $context.pageNumber }
              nextPageNumber: ${ $context.pageNumber + 1 }
              iteration: ${ $data.index }
